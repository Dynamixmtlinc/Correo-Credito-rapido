name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  APP_NAME: 'cr-dynamixmtl'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Instalar dependencias ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generar cliente Prisma ─────────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate

      # ── 5. Build Next.js ──────────────────────────────────────────────────────
      - name: Build Next.js app
        env:
          NEXTAUTH_URL: https://${{ env.APP_NAME }}.azurewebsites.net
        run: npm run build

      # ── 6. Preparar artefacto de deploy ──────────────────────────────────────
      - name: Prepare deployment package
        run: |
          cp -r .next/standalone ./deploy
          cp -r .next/static ./deploy/.next/static
          cp -r public ./deploy/public 2>/dev/null || true

      # ── 7. Login Azure via OIDC (sin secrets en GitHub) ──────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: b1d3a2ca-090f-4542-acde-6a244e2f1fe0
          tenant-id: 0f0db576-1539-42df-ac92-2e8a1abbf863
          subscription-id: 0ca5a006-cb68-4486-9544-9a291b3b9943

      # ── 8. Deploy a App Service ───────────────────────────────────────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ./deploy

      # ── 9. Logout Azure ──────────────────────────────────────────────────────
      - name: Azure Logout
        if: always()
        run: az logout
